	<style id="test1" data-title="page styling">
		/* test styling */
		:root {
			--grid-gap:4px;
		}

		#test1 {
			--icon-width:64px;
			--icon-height:64px;
		}
		/* container styling */
		/* icons are always a list of inline blocks.
		Use a wrapper and a flexbox to align them */
		.flex {
			display: flex;
			grid-gap:4px;
		}
		.flex-column {
			display: flex;
			flex-direction: column;
			justify-content: flex-start;
			width:42px;
		}

		.flex-end {
			display: flex;
			justify-content: flex-end;
		}

		.flex-stretch div {
			flex-grow: 1;
		}
	</style>
	<style id="test2" data-title="other styling">
		body {
			--title-font:'Open Sans';
			background-color: Bisque;
			--font-size:0.86em;
			--text-font: 'courier new';
		}
		
		.panels > div {
			margin:4px;
			background-color: white;
			border:1px solid DarkSlateGrey;
		}

		.panels .cs-title {
			color:white;
			--title-font-size:100%;
			--title-font-weight:300%;
			--title-font-align:center;
			color:MintCream;
			background-color: DarkSlateGrey;
			padding:4px;
		}

		.panels .cs-title + div {
			padding: 4px;
		}
		/* Button defaults */
		.button  {
			color:red;
			font-family:var(--text-font);
		}
		
		@container button {
			label {
				padding:4px;
			}
		}

		.button:hover  {
			color:magenta;
		}
		

		/* Scheme no font */
		.scheme-no-font .button {
			color:teal;
			--icon-width:16px;
			--icon-height:16px;
			padding:2px;

		}

		.scheme-no-font .icon {
			font-family: verdana;
		}
		/* Scheme panel */
		.scheme-panel .button {
			background-color: #c5c5c5;
			border: 1px solid hotpink;
			color:red;
			fill:red;
			stroke:red;
			padding:4px 18px;

		}
		.scheme-panel .button:hover {
			color: #ff00ff;
			fill:#ff00ff;
			stroke:#ff00ff;
			background-color: #ffff00;
		}
		/* Scheme rollout */
		.scheme-rollout .button {
			color:teal;
			--icon-width:32px;
			--icon-height:32px;
			--button-padding:2px;
		}
		
		.scheme-rollout .button:hover  {
			color:white;
			background-color:teal;
		}

		.scheme-rollout  .button:hover label {
			background-color: teal;
			color:  inherit;
		}

		@media only screen and (max-width: 767px) {
			.scheme-rollout .button {
				--popout: 0;
			}
			.flex-column {
				width:auto;
			}
		}
		
		.setting-align-left {
			--button-align:left;	
		}
		.setting-align-right {
			--button-align:right; 		
		}
		.setting-align-center {
			--button-align:	center;
		}

		.setting-popout {
			--popout: 1;
		}

		

	</style>

<script src="."../asset/js/jquery-3.4.1.js"></script>
<!--- No Javascript necessary for buttons but for popouts 
	you can set the widths otherwise they need to be fixed (--popoutwidth)
	for animation. You can just use "auto" but they the don't pop --->
<script type="text/javascript">
$(document).ready(function() {
	$(".scheme-rollout label").each(function() {
            var $el = $(this);

            // Skip if element is hidden or has display:inline
            var originalPadding = $el.css('padding');ombined
            
            // Clone element off-screen to measure natural width
            var $clone = $el.clone().css({
                width: 'auto',
                visibility: 'hidden',
                position: 'absolute',
                left: -9999,
                top: -9999,
                padding: originalPadding
            }).appendTo('body');

            var autoWidth = $clone.outerWidth(); // natural width in px
            $clone.remove();

            // Set the measured width on the element
            $el.css('--popoutwidth', autoWidth + 'px');
        });
});
</script>
