<!DOCTYPE html>
<html>
<head>
	<title>Tabs test</title>
	<link rel="stylesheet" type="text/css" href="../assets/css/reset.css">
	<link rel="stylesheet" type="text/css" href="../assets/css/title.css">
	<link rel="stylesheet" type="text/css" href="../assets/css/fonts/fonts_local.css">
	<link rel="stylesheet" type="text/css" href="../assets/css/media.css">	
	<meta charset="UTF-8">
	<style>
		body {
			--title-font:font-family: 'Open Sans';
		}
		img {
			max-width: 100%;
		}
		
		.item {
			height:100%;
			transition: width 0.6s ease-in;
		}

		#item1 {
			width:200px;
			background-color: teal;
		}

		.item.closed {
			width:0px !important;
			overflow: hidden;
		}

		#item3 {
			--open:1;
			width:200px;
			background-color: teal;
		}

		body.media-mobile #item3 {
			--open:0;
		}

		#container {
			display: grid;
			grid-template-rows: 1fr;
			grid-template-columns: max-content auto max-content;
			height:400px;
		}
		.buttons {
			display: flex;
			grid-gap: 2px;
		}
		.button {
			border: 1px solid teal;
		}
		
		
	</style>
</head>
<body>

<div class="media-mobile">
	<h1>Mobile only</h1>
</div>
<div class="media-mid">
	<h1>Mid and below</h1>
</div>
<div class="media-midonly">
	<h1>Mid only</h1>
</div>
<div class="media-main">
	<h1>Main only</h1>
</div>
<div class="media-max">
	<h1>Max only</h1>
</div>

<div id="container">
<div id="item1" class="item autoopen">
Item 1
</div>
<div id="item2" class="item">
Item 2
</div>
<div id="item3" class="item autoopen">
Item 3
</div>
</div>


<div class="buttons">
<div class="button auto"><a id="open1_button" href="#item1.open">Open 1</a></div>
<div class="button auto"><a id="close1_button" href="#item1.close">Close 1</a></div>
<div class="button auto"><a id="open2_button" href="#item3.open">Open 3</a></div>
<div class="button auto"><a id="close2_button" href="#item3.close">Close 3</a></div>
</div>

<script src="../assets/js/jquery-3.4.1.js" type="text/javascript" charset="utf-8"></script>
<script src="../assets/js/jquery.animateAuto.js"></script>	
<script src="../assets/js/jquery.autoopen.js"></script>	
<script src="../assets/js/jquery.throttledresize.js"></script>

<script src="../assets/js/jquery.autoButton.js"></script>

</html>
