<!DOCTYPE html>

	<style>

	#testform {
		max-width: 600px;
		margin:80px auto;
		border:1px solid var(--border-color);
		--field-background-color: white;
		--field-border-color: #aaa;
		--input-padding: 8px;
		--checkbox-replace: 1;
		--checkbox-align: horizontal;
	}
	@media screen and (max-width: 800px) {
		#testform  {
			--field-layout:column;
		}
	}

	#testform .buttons .button {
		border-color:var(--border-color);
		border-width:1px;
		border-style:solid;
		background-color: white;
		padding: 4px 8px;
	}

	#testform .buttons .button:hover {
		background-color:  #efefef;
	}

	#testform .fieldrow:nth-child(even) {
		background-color: #efefef;
	}

	form {
		--error-color: #dc2626
	}
	form .error {
		--field-background-color: #fdecea;
	}
	
	.field4 {
		--checkbox-cols: 2; /* number of cols for checkbox/radio fields */
		--checkbox-gap: 12px;
	}


	/* To redefine the checkbox replacements, you have to redefine the styling for all for settings. Normally would be applying an icon font or something. This example redfeins a background color. You would still need to undefine the background image
	like this if you wanted an icon font. */

	/* Base style for both checkbox & radio */
	.field4 input[type="checkbox"] + label:before,
	.field4 input[type="radio"] + label:before {
	    background: #ff00ff;
	    background-image: none;
	}

	/* Checked state for both */
	.field4 input[type="checkbox"]:checked + label:before,
	.field4 input[type="radio"]:checked + label:before {
		  background-image: none;
	    background: #ffff00;
	}

	.field6 input[type="checkbox"] + label:before,
	.field6 input[type="radio"] + label:before {
		color: teal;
		background-image: none;
		font: var(--icon-font);
		content: "check_box_outline_blank";
	}

	.field6 input[type="radio"] + label:before {
		content: "radio_button_unchecked";
	}

	.field6 input[type="radio"]:checked + label:before {
		content: "radio_button_checked";
	}

	.field6 input[type="checkbox"]:checked + label:before {
		content: "check_box";
	}

	</style>
</head>

<body>

<script src="../assets/js/jquery-3.4.1.js"></script>

<script src="../assets/js/jquery.clikForm.js"></script>

<script type="text/javascript">
	$(document).ready(function() {
		$("#testform").clikForm({
			debug:false,
			// ApiHelper submission options:
			// submit_mode: "form" | "json" | "jsonField" | "formPlusJsonField"
			submit_mode: "form",
			submit_method: "post",
			// json_field_name is used by jsonField / formPlusJsonField modes
			json_field_name: "data",
			on_complete: function(payload) {
				console.log("clikForm complete", payload);
			},
			rules : {
				  email: {
			    	required: true,
			    	email: true
			    },
			    field2: {
			    	required: true,
			    	minlength: 2,
			    	maxlength: 3
			    },
			    field3: {
			    	required: true			    	
			    },
			    field6: {
			    	required: true		
			    },
			    field7: {
			    	required: true,
			    	code: true		
			    }
			},
			messages: {
		        email: {
		            required: 'Email address is required',
		            email: 'Please enter a valid email address'
		        },
		        field2: 'Please select 2 or 3 items',
		        field3: "select some values",
		        field6: "Please tick you agree to our terms and conditions"
		    }

		});
	});

	function getOk(button) {
		button.form.action = "form_resonse_valid.json";
		$(button.form).trigger("submit");
	}

	function getErrors(button) {
		button.form.action = "form_resonse_invalid.json";
		$(button.form).trigger("submit");
	}

	function failError(button) {
		button.form.action = "gingganggooly.json";
		$(button.form).trigger("submit");
	}
</script>
