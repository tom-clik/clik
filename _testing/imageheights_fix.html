<!--

# Image height fix

See notes about image sizing. We want to be able to contain images even when an uber containers
has a flexible height.

It works by hiding the image, getting the height of the container, fixing that height and then showing the image again.

## Test

> 1200 no fix <1200 >800 fixed height <800 height set to 300px in css, no fix.

-->

<!DOCTYPE html>
<html>

<head>
	<meta name="viewport" content="width=device-width,initial-scale=1.0">
	<link rel="stylesheet" type="text/css" href="/_assets/css/reset.css">
	<link rel="stylesheet" type="text/css" href="/_assets/css/grids.css">
	<link rel="stylesheet" type="text/css" href="/_assets/css/images.css">
	<link rel="stylesheet" type="text/css" href="css/testing.css">
	<style>
	body {
		padding:20px;
		background-color: #ccc;
	}

	/** Set the page to */
	#ubercontainer {
		background-color: #fff;
		border: 1px solid #000;
		padding:20px;
		margin: 0 auto;
		max-width: 660px;
		min-height:100%;
		--grid-mode: rows;
		--grid-template-rows: min-content auto;
	}


	#test {
		border:1px solid gray;
		padding:4px;
		margin:20px 0;
		--heightfix:1;
		--object-position-y:80%;
		--object-position-x:60%;
		/* this will work */
		--object-fit: cover;
		min-height:120px;
	}

	a {
		border:1px solid gray;
		padding:4px;
		margin:20px 0;
		display: inline-block;
	}

	@media (max-width:800px) {
		#test {
			--object-fit: contain;
			--object-position-y:middle;
			--object-position-x:center;
			--heightfix:0;
			max-height: 300px;
		}

	}

	div.mid span {
		display: none;
	}

	@media (min-width:1000px) and (max-width:1200px) {
		#test figcaption {
			display: none;
		}
		div.mid span {
			display: block;
		}
	}


	
	@media (min-width:1200px) {
		#test {
			--heightfix:0;
		}
	}
	</style>
</head>

<body>

	<div id="ubercontainer" class="grid">
		<div class="gridInner">
			<div class="max">No Fixed height</div>
			<div class="mid">Dynamic Fixed height applied by script <span>NO CAPTION</span></div>
			<div class="mobile">Container has fixed height applied by CSS</div>
			<div id="test" class="cs-image">
				<figure>
					<img src="images/earthly-beauties-V3W8Lknvhq8-unsplash.jpg"> 
					<figcaption>Lorem iposum</figcaption>
				</figure>
			</div>
		</div>
	</div>

</body>

<script src="/_assets/js/jquery-3.4.1.js" type="text/javascript" charset="utf-8"></script>
<script src="/_assets/js/mustache.js"></script>
<script src="/_assets/js/jquery.throttledresize.js" type="text/javascript" charset="utf-8"></script>
<script src="/_assets/js/swipeDetector.js"></script>
<script src="/_assets/js/heightFix.js"></script>
<script src="/_assets/js/clik_common.js"></script>
<!-- <script src="/_assets/js/clik_onready.js"></script> -->
<script>
$(document).ready(function() {
	$(".cs-image").heightFix(
		{
			resize: clik.resize,
		}
	);
});
</script>

</html>
