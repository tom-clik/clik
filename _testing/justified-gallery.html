<!DOCTYPE html>
<html>

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="../assets/css/justifiedGallery.css" />
    <style>
        html { overflow-y: scroll; } /* To always show the scrollbar and avoid the flickering problem. */
    </style>
</head>

<body>
    <h1>Layout test</h1>
    <div id="simpletest">
     
    </div>
    
    <script src="../assets/js/jquery-3.4.1.js"></script>
    <script src="../assets/js/jquery.justifiedGallery.js"></script>
    <script src="sample_images.js"></script>
   
    <script>
        $(document).ready(function(){
            $elem = $("#simpletest");
            showPhotos(data.photos.photo,$elem);
            $elem.justifiedGallery({
                rowHeight: 240,
                sizeRangeSuffixes:

                    {'lt100':'_t',
                    'lt240':'_m',
                    'lt320':'_n',
                    'lt500':'',
                    'lt640':'_z',
                    'lt1024':'_b'}
            });
        });
       
    </script>
</body>

</html>
