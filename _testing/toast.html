<!DOCTYPE html>
<html lang="en">
    <head>
        <title>jQuery Toaster.js Demo</title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <!-- <link href="../assets/css/toast.css" rel="stylesheet"> -->
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/jquery-toast-plugin/1.3.2/jquery.toast.css" integrity="sha512-8D+M+7Y6jVsEa7RD6Kv/Z7EImSpNpQllgaEIQAtqHcI0H6F4iZknRj0Nx1DCdB+TwBaS+702BGWYC0Ze2hpExQ==" crossorigin="anonymous" referrerpolicy="no-referrer" />
        <style>
        body { background-color:#fafafa; font-family:'Roboto'; }
        h1 { margin:150px auto 50px auto; }
        </style>
    </head>
    <body>

        <h1>jQuery Toaster.js Demo</h1>

        <div id="errors"></div>

        <button onclick="addToast('error')" >Error</button>
        <button onclick="addToast('info')" >Info</button>
        <button onclick="addToast('notice')" >Notice</button>
        <button onclick="addToast('success')" >Success</button>
        <button onclick="addToast('warning')" >Warning</button>

        <div id="text"></div>
        <!-- <script src="../assets/js/jquery-3.4.1.js"></script> -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.4.1/jquery.min.js" integrity="sha512-bnIvzh6FU75ZKxp0GXLH9bewza/OIw6dLVh9ICg0gogclmYGguQJWl8U30WpbsGTqbIiAwxTsbe76DErLq5EDQ==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <!-- <script src="../assets/js/toast.js"></script> -->
        <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery-toast-plugin/1.3.2/jquery.toast.min.js" integrity="sha512-zlWWyZq71UMApAjih4WkaRpikgY9Bz1oXIW5G0fED4vk14JjGlQ1UmkGM392jEULP8jbNMiwLWdM8Z87Hu88Fw==" crossorigin="anonymous" referrerpolicy="no-referrer"></script>
        <script type="text/javascript">

        function addToast(type){
            $.Toast("test", "this is a test message.", type, {
                has_icon:true,
                has_close_btn:true,
                fullscreen:false,
                timeout:2000,
                stack:true,
                has_progress:true,
                rtl:false,
                appendTo: 'body',// use 'body' to auto apply fixed class
                position_class: "toast-top-right"
            });
        }

       
        </script>
    </body>
</html>
